schemaVersion: 2.0.0
docId: rark.vue.addons.v-lazy
component:
  name: vLazy
  framework: vue
  package: '@raxium/vue-addons-v-lazy'
  importPath: '@raxium/vue-addons-v-lazy'
  exportName: vLazy
  category: addon
  description: 图片/背景资源懒加载指令，元素进入可视区后再加载目标资源，支持 loading/error 占位、滚动容器监听、数组源回退。
  basePrimitive:
    library: vue
    primitive: DirectiveBinding
    nativeElement: img
  passThrough:
    htmlAttributes:
      - src
      - style
      - href
      - xlink:href
      - lazy
      - src-size
      - src-index
      - no-cache
    notes: 指令形态 v-lazy:arg.[containerRef]="value"。修饰符：第一个 modifier key 作为容器名，优先查 $refs[key]，未命中再查
      getElementById(key)；无 modifier 时回退 scrollParent(el)。元素属性 no-cache 存在时禁用该元素缓存。
  capabilities:
    - lazy-load
    - loading-placeholder
    - error-fallback
    - scroll-container
    - array-src-fallback
contracts:
  props:
    - name: value
      typeText: string
      conflictsWith:
        - src
      description: 简写：直接作为目标资源地址（通常用于 img src）。
    - name: src
      typeText: string | string[]
      conflictsWith:
        - value
      description: 主资源地址。string[] 时按序尝试加载，命中成功项后记录对应索引（src-index 属性）。
    - name: loading
      typeText: string
      description: 加载中占位资源。未指定时使用插件 loading 配置或 1x1 gif。
    - name: error
      typeText: string
      description: 加载失败占位资源。未指定时使用插件 error 配置或 1x1 gif。
    - name: arg
      typeText: '''src'' | ''background-image'' | ''background'' | ''backgroundImage''
        | ''href'' | ''xlink:href'''
      default: src
      description: 指令参数。src（默认）写入 src 属性；background-image/background/backgroundImage
        写入 style.backgroundImage；href/xlink:href 写入对应链接属性（SVG/use）。
    - name: containerRef
      typeText: string
      description: 滚动容器引用名，通过 modifier 传入（v-lazy.[containerRef]）。优先查 $refs[key]，未命中再查
        getElementById(key)；无 modifier 时回退 scrollParent(el)。
  events:
    - name: loading
      payload:
        typeText: CustomEvent<ReactiveListener>
      description: 加载开始时由目标元素派发。仅当插件启用 dispatchEvent 时触发。
    - name: loaded
      payload:
        typeText: CustomEvent<ReactiveListener>
      description: 加载成功时由目标元素派发。仅当插件启用 dispatchEvent 时触发。
    - name: error
      payload:
        typeText: CustomEvent<ReactiveListener>
      description: 加载失败时由目标元素派发。仅当插件启用 dispatchEvent 时触发。
  slots: []
  themeConfiguration:
    fields: []
    notes: v-lazy 不提供 theme 配置。可通过宿主元素 class、CSS 变量与业务样式系统控制视觉表现。
behaviorModel:
  derived:
    bindType: arg ?? 'src'
    container: 'modifiers[0] ? ($refs[modifiers[0]] || getElementById(modifiers[0]))
      : scrollParent(el)'
    noCache: el.hasAttribute('no-cache')
  transitions:
    - on: beforeMount
      guard: el not in ListenerQueue
      effects:
        - parse value (string -> src; object -> src/loading/error)
        - resolve container from modifiers or scrollParent
        - create ReactiveListenerEx
        - add to ListenerQueue
        - observe el
        - lazyLoadHandler
    - on: beforeUpdate
      guard: always
      effects:
        - update listener with new binding.value
    - on: updated
      guard: always
      effects:
        - lazyLoadHandler
    - on: intersection
      guard: el in viewport
      effects:
        - load image/background
        - 'on success: set state=loaded, write src/backgroundImage/href'
        - 'on fail: set state=error, write error placeholder'
        - 'if dispatchEvent: el.dispatchEvent(CustomEvent)'
    - on: unmounted
      guard: always
      effects:
        - remove from ListenerQueue
        - unobserve el
exampleDefaults:
  mcp:
    server: raxium
    tool: get-example
    args:
      framework: vue
      componentName: addons/directives/v-lazy
examples:
  - id: basic
    description: 基础图片懒加载
  - id: background
    description: 背景图懒加载
  - id: scroll-container
    description: 滚动容器场景
  - id: array-src
    description: 数组源回退加载
generationHints:
  preferredUsageOrder:
    - src
    - loading
    - error
    - arg
    - containerRef
  a11yChecklist:
    - 图片需提供 alt 属性；背景图场景确保有等效文本或装饰性声明。
    - loading/error 占位需保证可感知，避免布局跳变。
  codegenTemplates:
    minimal: <img v-lazy="'https://example.com/image.jpg'" alt="" />
    withPlaceholders: '<img v-lazy="{ src: url, loading: loadingUrl, error: errorUrl
      }" alt="" />'
    background: '<div v-lazy:background-image="{ src: bgUrl }" class="bg-cover bg-center"
      />'
    scrollContainer: <div ref="scrollBox"><img v-lazy.scrollBox="url" alt="" /></div>
    arraySrc: '<img v-lazy="{ src: [primaryCdn, fallbackCdn] }" alt="" />'
  antiPatterns:
    - <img v-lazy="url" /> — 仅传字符串时 loading/error 不可控，建议用对象形式
    - v-lazy 绑定在频繁切换的列表项且无 no-cache — 旧缓存可能影响实时性
    - 滚动容器未设置 ref 或 id — 可能回退到错误的祖先滚动节点
provenance:
  sources:
    - path: ./index.ts
      kind: runtime
    - path: ./lazy.ts
      kind: runtime
    - path: ./v-lazy.doc.mdx
      kind: doc
    - path: ./v-lazy.stories.ts
      kind: story
    - path: ./examples/basic.vue
      kind: example
    - path: ./examples/background.vue
      kind: example
    - path: ./examples/scroll-container.vue
      kind: example
    - path: ./examples/array-src.vue
      kind: example
  precedence:
    - runtime
    - type
    - doc
