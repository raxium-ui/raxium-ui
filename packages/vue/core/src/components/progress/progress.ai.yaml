schemaVersion: 2.0.0
docId: rark.vue.progress
component:
  name: Progress
  framework: vue
  package: '@raxium/vue/core'
  importPath: '@raxium/vue/core'
  exportName: Progress
  category: core
  description: 用于展示任务完成度或流程进度，支持线性进度条、圆形进度和弧形进度三种形态。基于 Ark UI Progress 构建，保留 Ark UI
    的进度状态与可访问性语义，扩展 theme、局部 ui 覆盖与 transfer 视觉变体能力。
  basePrimitive:
    library: '@ark-ui/vue/progress'
    primitive: Progress.RootProvider
    nativeElement: div
  passThrough:
    htmlAttributes:
      - aria-*
      - data-*
    notes: 根组件透传 Ark UI Root 常用能力（modelValue/defaultValue、min/max、orientation、formatOptions、translations
      等），并扩展 theme 与根 class。
  capabilities:
    - modelValue
    - min
    - max
    - orientation
    - theme
    - ui-override
    - variant
  subComponents:
    - ProgressLinear
    - ProgressCircle
    - ProgressArc
contracts:
  props:
    - name: modelValue
      typeText: number | null
      conflictsWith:
        - defaultValue
      description: 受控进度值（配合 v-model）。
    - name: defaultValue
      typeText: number
      default: 50
      conflictsWith:
        - modelValue
      description: 非受控初始值。
    - name: min
      typeText: number
      default: 0
      description: 最小值。
    - name: max
      typeText: number
      default: 100
      description: 最大值。
    - name: orientation
      typeText: '''horizontal'' | ''vertical'''
      default: horizontal
      description: 进度方向（影响线性轨道布局）。
    - name: formatOptions
      typeText: NumberFormatOptions
      default:
        style: percent
      description: 用于格式化值文本。
    - name: translations
      typeText: IntlTranslations
      description: 无障碍与值文本相关文案。
    - name: theme
      typeText: ThemeCrafts<'tvProgress'>
      description: 主题参数与 tvProgress crafts 覆盖。
    - name: class
      typeText: string | array | object
      description: 根节点附加 class。
  events:
    - name: update:modelValue
      payload:
        typeText: '(value: number | null)'
      description: 受控进度值同步。
    - name: valueChange
      payload:
        typeText: '(details: ValueChangeDetails)'
      description: 进度值变化时触发（Ark UI Root 事件）。
  slots:
    - name: default
      slotPropsSchema:
        type: object
        properties: {}
        additionalProperties: false
      description: 主组合插槽，用于放置 ProgressLinear/ProgressCircle/ProgressArc 以及 Label/ValueText
        等子节点。
  themeConfiguration:
    fields:
      - name: size
        typeText: '''xs'' | ''sm'' | ''base'' | ''lg'''
        default: base
        description: 控制线性高度/圆形尺寸等视觉尺度。
      - name: orientation
        typeText: '''horizontal'' | ''vertical'''
        default: horizontal
        description: 参与 tvProgress 样式分支计算。
      - name: skin
        typeText: '''razer'' | ''shadcn'''
        description: 主题皮肤。
      - name: surface
        typeText: '''light'' | ''dark'''
        description: 表面语义。
      - name: unstyled
        typeText: boolean
        description: 是否移除内置样式。
      - name: crafts
        typeText: object
        description: 覆写 tvProgress crafts 配置。
subComponents:
  ProgressLinear:
    props:
      - name: variant
        typeText: '''default'' | ''robbin'' | ''transfer'''
        default: default
        description: 线性范围条视觉变体。
      - name: theme
        typeText: ThemeNoCrafts
        description: 继承根主题，也可局部覆盖通用主题参数（不含 crafts）。
      - name: ui
        typeText: '{ track?: class; range?: class }'
        description: 轨道与范围节点 class 覆盖。
      - name: class
        typeText: string | array | object
        description: 附加到轨道节点的 class。
    slots: []
    uiConfiguration:
      fields:
        - name: track
          typeText: string | array | object
          description: 线性轨道 class 覆盖。
        - name: range
          typeText: string | array | object
          description: 线性范围 class 覆盖。
  ProgressCircle:
    props:
      - name: variant
        typeText: '''default'' | ''transfer'''
        default: default
        description: 圆形进度视觉变体。
      - name: theme
        typeText: Omit<ProgressCircleTheme, 'crafts'>
        description: 圆形局部主题参数（不支持在子组件传入 crafts）；theme.size 支持 'xs'|'sm'|'base'|'lg'
          或 number 像素值。
      - name: ui
        typeText: '{ circle?: class; circleTrack?: class; circleRange?: class }'
        description: 圆形根节点、轨道、范围 class 覆盖。
      - name: class
        typeText: string | array | object
        description: 圆形根节点附加 class。
    slots: []
    uiConfiguration:
      fields:
        - name: circle
          typeText: string | array | object
          description: 圆形根节点 class 覆盖。
        - name: circleTrack
          typeText: string | array | object
          description: 圆形轨道 class 覆盖。
        - name: circleRange
          typeText: string | array | object
          description: 圆形范围 class 覆盖。
  ProgressArc:
    props:
      - name: theta
        typeText: number
        default: 60
        description: 弧形留白角度（单位：度）。
      - name: variant
        typeText: '''default'' | ''transfer'''
        default: default
        description: 弧形范围视觉变体。
      - name: theme
        typeText: Omit<ProgressCircleTheme, 'crafts'>
        description: 弧形局部主题参数；theme.size 支持 'xs'|'sm'|'base'|'lg' 或 number 像素值。
      - name: ui
        typeText: '{ circle?: class; circleTrack?: class; circleRange?: class }'
        description: 弧形根节点、轨道、范围 class 覆盖。
      - name: class
        typeText: string | array | object
        description: 弧形根节点附加 class。
    slots: []
    uiConfiguration:
      fields:
        - name: circle
          typeText: string | array | object
          description: 弧形根节点 class 覆盖。
        - name: circleTrack
          typeText: string | array | object
          description: 弧形轨道 class 覆盖。
        - name: circleRange
          typeText: string | array | object
          description: 弧形范围 class 覆盖。
behaviorModel:
  derived:
    percent: 'value !== null ? (value - min) / (max - min) * 100 : 0'
  transitions:
    - on: value_update
      guard: always
      effects:
        - updateValue(newValue)
        - emit:update:modelValue
        - emit:valueChange
exampleDefaults:
  mcp:
    server: raxium
    tool: get-example
    args:
      framework: vue
      componentName: Progress
examples:
  - id: basic
    description: 基础用法
  - id: linear-variants
    description: 线性变体（default/robbin/transfer）
  - id: sizes-and-orientation
    description: 尺寸与方向（横向/纵向）
  - id: circle-and-arc
    description: 圆形与弧形进度
  - id: custom-ui
    description: UI 覆盖示例
generationHints:
  preferredUsageOrder:
    - modelValue
    - min
    - max
    - orientation
    - theme
  a11yChecklist:
    - 组件基于 Ark UI，内置进度语义与可访问性。
    - 需要表达进度状态时使用 ProgressLabel、ProgressValueText。
  codegenTemplates:
    minimal: |-
      <Progress :model-value="50">
        <ProgressLinear />
      </Progress>
    linear: |-
      <Progress v-model="value">
        <ProgressLinear variant="transfer" />
      </Progress>
    circle: |-
      <Progress v-model="value">
        <ProgressCircle variant="default" />
      </Progress>
    arc: |-
      <Progress v-model="value">
        <ProgressArc :theta="60" variant="transfer" />
      </Progress>
    controlled: |-
      <Progress v-model="value" @value-change="onChange">
        <ProgressLinear variant="transfer" />
      </Progress>
  antiPatterns:
    - <Progress v-model="value" :default-value="50" />
    - <Progress orientation="vertical"><ProgressLinear /></Progress>
    - <ProgressLinear />
provenance:
  sources:
    - path: ./progress.doc.mdx
      kind: doc
    - path: ./props.ts
      kind: type
    - path: ./Progress.vue
      kind: runtime
    - path: ./ProgressLinear.vue
      kind: runtime
    - path: ./ProgressCircle.vue
      kind: runtime
    - path: ./ProgressArc.vue
      kind: runtime
    - path: ./progress.stories.ts
      kind: story
  precedence:
    - runtime
    - type
    - doc
