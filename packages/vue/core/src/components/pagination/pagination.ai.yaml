schemaVersion: 2.0.0
docId: rark.vue.pagination
component:
  name: Pagination
  framework: vue
  package: '@raxium/vue/core'
  importPath: '@raxium/vue/core'
  exportName: Pagination
  category: core
  description: 用于列表、表格等长数据场景的页码导航，支持上一页/下一页、首尾页、省略页码展示以及受控分页状态管理。基于 Ark UI Pagination
    构建，扩展 theme 与 ui 配置。由 Pagination（根）、PaginationGoTo、PaginationGoToTrigger、PaginationPageSize
    组成。
  basePrimitive:
    library: '@ark-ui/vue/pagination'
    primitive: Pagination.RootProvider
    nativeElement: div
  passThrough:
    htmlAttributes:
      - aria-*
      - data-*
    notes: 透传 Ark UI PaginationRootBaseProps；theme、ui 为 Rark 扩展。
  capabilities:
    - v-model:page
    - v-model:page-size
    - theme
    - ui-override
    - programmatic-api
  subComponents:
    - PaginationGoTo
    - PaginationGoToTrigger
    - PaginationPageSize
contracts:
  props:
    - name: page
      typeText: number
      conflictsWith:
        - defaultPage
      description: 受控当前页（配合 v-model:page）。
    - name: pageSize
      typeText: number
      conflictsWith:
        - defaultPageSize
      description: 受控每页条数（配合 v-model:page-size）。
    - name: count
      typeText: number
      description: 总条目数。
    - name: defaultPage
      typeText: number
      conflictsWith:
        - page
      description: 非受控模式下的初始页码。
    - name: defaultPageSize
      typeText: number
      conflictsWith:
        - pageSize
      description: 非受控模式下的初始每页条数。
    - name: siblingCount
      typeText: number
      description: 当前页两侧展示的相邻页码数量。
    - name: type
      typeText: '''button'' | ''link'''
      description: 触发元素类型；link 模式下可生成跳转 URL。
    - name: getPageUrl
      typeText: '(details: { page: number }) => string'
      description: type='link' 时用于生成页码链接。
    - name: class
      typeText: string | array | object
      description: 根节点自定义 class。
    - name: theme
      typeText: ThemeCrafts<'tvPagination'>
      description: 分页主题参数与 crafts 覆盖。
    - name: ui
      typeText: '{ root?: class; control?: class; firstPage?: class; prevPage?: class;
        nextPage?: class; lastPage?: class; item?: class; ellipsis?: class }'
      description: 各结构节点 class 覆盖。
  events:
    - name: update:page
      payload:
        typeText: '(page: number)'
      description: 当前页变化时触发，用于 v-model:page。
    - name: update:page-size
      payload:
        typeText: '(pageSize: number)'
      description: 每页条数变化时触发，用于 v-model:page-size。
    - name: page-change
      payload:
        typeText: '(details: { page: number; pageSize: number })'
      description: 页码变化回调。
    - name: page-size-change
      payload:
        typeText: '(details: { pageSize: number })'
      description: 每页条数变化回调。
  slots:
    - name: default
      slotPropsSchema:
        type: object
        properties: {}
        additionalProperties: false
      description: 放置附加能力组件（如 PaginationGoTo、PaginationPageSize）。
  themeConfiguration:
    fields:
      - name: size
        typeText: '''sm'' | ''base'' | ''lg'''
        default: base
        description: 分页尺寸。
      - name: skin
        typeText: '''razer'' | ''shadcn'''
        description: 主题皮肤。
      - name: surface
        typeText: '''light'' | ''dark'''
        description: 亮/暗表面语义。
      - name: unstyled
        typeText: boolean
        description: 移除默认样式。
      - name: crafts
        typeText: object
        description: 覆盖分页相关 crafts 细节
  uiConfiguration:
    fields:
      - name: ui.root
        typeText: string | array | object
        description: 分页根容器 class
      - name: ui.control
        typeText: string | array | object
        description: 分页控制区 class
      - name: ui.firstPage
        typeText: string | array | object
        description: 首页按钮 class
      - name: ui.prevPage
        typeText: string | array | object
        description: 上一页按钮 class
      - name: ui.nextPage
        typeText: string | array | object
        description: 下一页按钮 class
      - name: ui.lastPage
        typeText: string | array | object
        description: 末页按钮 class
      - name: ui.item
        typeText: string | array | object
        description: 页码项 class
      - name: ui.ellipsis
        typeText: string | array | object
        description: 省略节点 class
subComponents:
  PaginationGoTo:
    props:
      - name: theme
        typeText: ThemeNoCrafts
        description: 跳页输入区主题参数，继承父级 theme 上下文。
      - name: class
        typeText: string | array | object
        description: 根节点自定义 class。
      - name: ui
        typeText: '{ root?: HTMLAttributes[''class'']; input?: HTMLAttributes[''class'']
          }'
        description: 跳页容器与输入区域 class 覆盖。
    slots:
      - name: prefix
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        description: 跳页输入框前置内容。
      - name: suffix
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        description: 跳页输入框后置内容，常用于放置 PaginationGoToTrigger。
    uiConfiguration:
      fields:
        - name: ui.root
          typeText: string | array | object
          description: 跳页容器 class
        - name: ui.input
          typeText: string | array | object
          description: 跳页输入框 class
  PaginationGoToTrigger:
    props:
      - name: asChild
        typeText: boolean
        default: false
        description: Ark Polymorphic 能力：将触发行为合并到子元素。
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties:
            go:
              type: function
              description: 执行跳页的函数
          additionalProperties: false
        description: 触发器内容，作用域包含 { go }。
  PaginationPageSize:
    props:
      - name: sizes
        typeText: number[]
        default:
          - 10
          - 20
          - 30
          - 50
        description: 可选每页条数列表（内部会去重）。
      - name: placeholder
        typeText: string
        default: Page size
        description: 未选中时显示文案。
      - name: theme
        typeText: ThemeNoCrafts
        description: 每页条数选择器主题参数，继承父级 theme 上下文。
      - name: class
        typeText: string | array | object
        description: 根节点自定义 class。
      - name: ui
        typeText: '{ root?: class; control?: class; trigger?: class; value?: class;
          content?: class; item?: class }'
        description: Select 各结构节点 class 覆盖。
    slots:
      - name: prefix
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        description: 每页条数选择器前置内容。
      - name: suffix
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        description: 每页条数选择器后置内容。
    uiConfiguration:
      fields:
        - name: ui.root
          typeText: string | array | object
          description: 每页条数根容器 class
        - name: ui.control
          typeText: string | array | object
          description: Select 控制区 class
        - name: ui.trigger
          typeText: string | array | object
          description: Select 触发器 class
        - name: ui.value
          typeText: string | array | object
          description: Select 值展示区 class
        - name: ui.content
          typeText: string | array | object
          description: Select 下拉内容区 class
        - name: ui.item
          typeText: string | array | object
          description: Select 选项项 class
behaviorModel:
  derived:
    totalPages: Math.ceil(count / pageSize)
    canGoPrev: page > 1
    canGoNext: page < totalPages
  transitions:
    - on: goToFirstPage
      guard: page > 1
      effects:
        - setPage(1)
        - emit:update:page
    - on: goToLastPage
      guard: page < totalPages
      effects:
        - setPage(totalPages)
        - emit:update:page
    - on: prevPage
      guard: canGoPrev
      effects:
        - setPage(page - 1)
        - emit:update:page
    - on: nextPage
      guard: canGoNext
      effects:
        - setPage(page + 1)
        - emit:update:page
exampleDefaults:
  mcp:
    server: raxium
    tool: get-example
    args:
      framework: vue
      componentName: Pagination
examples:
  - id: basic
    description: 基础用法
  - id: minimal
    description: 精简模式
  - id: sizes
    description: 尺寸变体
  - id: controlled
    description: 受控分页与每页条数
  - id: events
    description: 事件监听
  - id: link-type
    description: Link 模式
generationHints:
  preferredUsageOrder:
    - count
    - page/pageSize
    - defaultPage/defaultPageSize
    - theme
    - PaginationGoTo
    - PaginationPageSize
  a11yChecklist:
    - type='link' 场景建议始终提供 getPageUrl
    - 分页状态需要与 URL 同步时优先使用受控模式
  codegenTemplates:
    minimal: <Pagination :count="100" />
    controlled: <Pagination v-model:page="page" v-model:page-size="pageSize" :count="total"
      />
    withGoTo: |-
      <Pagination v-model:page="page" :count="80" :default-page-size="10">
        <PaginationGoTo>
          <template #suffix>
            <PaginationGoToTrigger>GO</PaginationGoToTrigger>
          </template>
        </PaginationGoTo>
      </Pagination>
    withPageSize: |-
      <Pagination v-model:page="page" v-model:page-size="pageSize" :count="total">
        <PaginationPageSize>
          <template #prefix><span>每页</span></template>
          <template #suffix><span>条</span></template>
        </PaginationPageSize>
      </Pagination>
    full: |-
      <Pagination v-model:page="page" :count="80" :default-page-size="10">
        <PaginationGoTo>
          <template #suffix>
            <PaginationGoToTrigger>GO</PaginationGoToTrigger>
          </template>
        </PaginationGoTo>
        <PaginationPageSize>
          <template #prefix><span>每页</span></template>
          <template #suffix><span>条</span></template>
        </PaginationPageSize>
      </Pagination>
  antiPatterns:
    - <Pagination v-model:page="page" :default-page="1" /> — 同时使用 page 与 defaultPage
      导致冲突
    - <Pagination v-model:page-size="pageSize" :default-page-size="10" /> — 同时使用 pageSize
      与 defaultPageSize 导致冲突
    - <Pagination type="link" :count="100" /> — type='link' 未提供 getPageUrl 导致无法生成跳转链接
    - <Pagination :count="0" v-model:page="page" /> — 数据量变化后未同步重置 page 导致空页展示
provenance:
  sources:
    - path: ./pagination.doc.mdx
      kind: doc
    - path: ./props.ts
      kind: type
    - path: ./Pagination.vue
      kind: runtime
    - path: ./PaginationGoTo.vue
      kind: runtime
    - path: ./PaginationGoToTrigger.vue
      kind: runtime
    - path: ./PaginationPageSize.vue
      kind: runtime
    - path: ./pagination.stories.ts
      kind: story
  precedence:
    - runtime
    - type
    - doc
