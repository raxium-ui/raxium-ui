schemaVersion: 2.0.0
docId: rark.vue.menu
component:
  name: Menu
  framework: vue
  package: '@raxium/vue/core'
  importPath: '@raxium/vue/core'
  exportName: Menu
  category: core
  description: 复合菜单组件，用于承载命令选择、上下文菜单、单选/多选项等轻量操作入口。基于 Ark UI Menu 构建，支持受控与非受控状态、分组与子菜单。
  basePrimitive:
    library: '@ark-ui/vue/menu'
    primitive: ark.menu
    nativeElement: div
  passThrough:
    htmlAttributes:
      - aria-*
      - data-*
    notes: Menu 根组件透传 MenuRootBaseProps，子组件在 Ark UI 原语之上补充 theme/ui 能力。
  capabilities:
    - theme
    - ui-override
    - checkbox-item
    - radio-item
    - submenu
    - context-trigger
  subComponents:
    - MenuContent
    - MenuItem
    - MenuItemGroup
    - MenuCheckboxItem
    - MenuRadioItem
    - MenuRadioItemGroup
    - MenuTriggerItem
    - MenuArrow
contracts:
  props:
    - name: open
      typeText: boolean
      conflictsWith:
        - defaultOpen
      description: 受控打开状态（可用 v-model:open）
    - name: defaultOpen
      typeText: boolean
      conflictsWith:
        - open
      description: 非受控初始打开状态
    - name: highlightedValue
      typeText: string
      description: 受控高亮项值（可用 v-model:highlighted-value）
    - name: lazyMount
      typeText: boolean
      description: 延迟挂载内容
    - name: unmountOnExit
      typeText: boolean
      description: 关闭后卸载内容
    - name: class
      typeText: string | array | object
      description: 根节点附加 class
    - name: theme
      typeText: ThemeCrafts<'tvMenu' | 'tvCheckbox' | 'tvRadioGroup'>
      description: 菜单及关联选择器（checkbox/radio）的主题参数
  events:
    - name: select
      payload:
        typeText: '({ value: string; ... })'
      description: 菜单项被选择时触发
    - name: update:open
      payload:
        typeText: '(open: boolean)'
      description: v-model:open 的更新事件
    - name: update:highlightedValue
      payload:
        typeText: '(value: string | undefined)'
      description: v-model:highlighted-value 的更新事件
  slots:
    - name: default
      slotPropsSchema:
        type: object
        properties: {}
        additionalProperties: false
      description: 放置触发器与菜单内容结构
  themeConfiguration:
    fields:
      - name: size
        typeText: '''xs'' | ''sm'' | ''base'' | ''lg'''
        default: base
        description: 控制菜单项字号、内边距与间距
      - name: bordered
        typeText: boolean
        default: true
        description: 控制菜单内容区是否带边框
      - name: crafts
        typeText: object
        description: 覆盖 tvMenu/tvCheckbox/tvRadioGroup crafts 配置
subComponents:
  MenuContent:
    props:
      - name: class
        typeText: string | array | object
        description: 内容区附加 class
      - name: theme
        typeText: ThemeNoCrafts
        description: 继承或覆盖主题上下文
      - name: ui
        typeText: '{ positioner?: HTMLAttributes[''class'']; content?: HTMLAttributes[''class''];
          inner?: HTMLAttributes[''class''] }'
        description: 覆盖定位容器、内容容器与内部包裹层样式
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        description: 菜单内容；可包含 MenuArrow 与菜单项节点
    uiConfiguration:
      fields:
        - name: ui.positioner
          typeText: string | array | object
          description: 定位容器样式覆盖
        - name: ui.content
          typeText: string | array | object
          description: 内容容器样式覆盖
        - name: ui.inner
          typeText: string | array | object
          description: 内部包裹层样式覆盖
  MenuItem:
    props:
      - name: value
        typeText: string
        description: 菜单项值（用于选择事件）
      - name: disabled
        typeText: boolean
        default: false
        description: 禁用菜单项
      - name: closeOnSelect
        typeText: boolean
        description: 选中后是否关闭菜单
      - name: class
        typeText: string | array | object
        description: 菜单项附加 class
      - name: theme
        typeText: ThemeNoCrafts
        description: 继承或覆盖主题上下文
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        description: 菜单项文案或自定义内容
  MenuItemGroup:
    props:
      - name: label
        typeText: string
        description: 分组标题（未提供 label 插槽时生效）
      - name: class
        typeText: string | array | object
        description: 分组容器附加 class
      - name: theme
        typeText: ThemeNoCrafts
        description: 继承或覆盖主题上下文
      - name: ui
        typeText: '{ root?: HTMLAttributes[''class'']; label?: HTMLAttributes[''class'']
          }'
        description: 覆盖分组容器与标题样式
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        description: 分组内菜单项
      - name: label
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        renderWhen:
          - expr: provided
        description: 覆盖默认分组标题
    uiConfiguration:
      fields:
        - name: ui.root
          typeText: string | array | object
          description: 分组容器样式覆盖
        - name: ui.label
          typeText: string | array | object
          description: 分组标题样式覆盖
  MenuCheckboxItem:
    props:
      - name: checked
        typeText: boolean
        description: 受控勾选状态
      - name: value
        typeText: string
        description: 当前选项值
      - name: closeOnSelect
        typeText: boolean
        description: 切换后是否关闭菜单
      - name: ui
        typeText: '{ root?: HTMLAttributes[''class'']; checkbox?: HTMLAttributes[''class'']
          }'
        description: 覆盖 checkbox 菜单项与指示器样式
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties:
            checked:
              type: boolean
          additionalProperties: false
        description: 菜单项内容
      - name: indicator
        slotPropsSchema:
          type: object
          properties:
            checked:
              type: boolean
          additionalProperties: false
        renderWhen:
          - expr: provided
        description: 自定义勾选指示器
    events:
      - name: update:checked
        payload:
          typeText: '(checked: boolean)'
        description: 勾选状态变化
    uiConfiguration:
      fields:
        - name: ui.root
          typeText: string | array | object
          description: 菜单项根样式覆盖
        - name: ui.checkbox
          typeText: string | array | object
          description: checkbox 指示器样式覆盖
  MenuRadioItem:
    props:
      - name: value
        typeText: string
        description: 单选项值
      - name: variant
        typeText: '''default'' | ''checkbox'''
        default: default
        description: 指示器形态（圆点或勾选）
      - name: ui
        typeText: '{ root?: HTMLAttributes[''class'']; indicator?: HTMLAttributes[''class'']
          }'
        description: 覆盖 radio 菜单项与指示器样式
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties:
            checked:
              type: boolean
          additionalProperties: true
        description: 菜单项内容（接收 Ark Menu.ItemContext）
      - name: indicator
        slotPropsSchema:
          type: object
          properties:
            checked:
              type: boolean
          additionalProperties: true
        renderWhen:
          - expr: provided
        description: 自定义指示器（接收 Ark Menu.ItemContext）
    uiConfiguration:
      fields:
        - name: ui.root
          typeText: string | array | object
          description: 菜单项根样式覆盖
        - name: ui.indicator
          typeText: string | array | object
          description: 指示器样式覆盖
  MenuRadioItemGroup:
    props:
      - name: modelValue
        typeText: string
        description: 单选组当前值（v-model）
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        description: 承载一组 MenuRadioItem
    events:
      - name: update:modelValue
        payload:
          typeText: '(value: string)'
        description: 单选组值变化
  MenuTriggerItem:
    props:
      - name: value
        typeText: string
        description: 菜单项值（用于选择事件）
      - name: disabled
        typeText: boolean
        default: false
        description: 禁用菜单项
      - name: closeOnSelect
        typeText: boolean
        description: 选中后是否关闭菜单
      - name: class
        typeText: string | array | object
        description: 菜单项附加 class
      - name: theme
        typeText: ThemeNoCrafts
        description: 继承或覆盖主题上下文
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        description: 菜单项文案或自定义内容
  MenuArrow:
    props:
      - name: class
        typeText: string | array | object
        description: 箭头附加 class
      - name: theme
        typeText: ThemeNoCrafts
        description: 继承主题上下文
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        description: 箭头内容（通常不传，使用默认箭头）
behaviorModel:
  derived: {}
  transitions:
    - on: trigger_click
      guard: open === false
      effects:
        - setOpen(true)
    - on: item_select
      guard: always
      effects:
        - emit:select
    - on: close_on_select
      guard: closeOnSelect === true
      effects:
        - setOpen(false)
exampleDefaults:
  mcp:
    server: raxium
    tool: get-example
    args:
      framework: vue
      componentName: Menu
examples:
  - id: basic
    description: 基础用法
  - id: submenu
    description: 子菜单
  - id: checkbox
    description: 多选项（Checkbox）
  - id: radio
    description: 单选项（Radio）
  - id: context-trigger
    description: 右键上下文菜单
  - id: controlled-open
    description: 受控打开与高亮项
  - id: sizes
    description: 尺寸主题
generationHints:
  preferredUsageOrder:
    - open
    - theme.size
    - theme.bordered
  a11yChecklist:
    - 使用 Menu + MenuTrigger + MenuContent 作为固定骨架
    - 需要埋点时，优先监听根组件 select 事件
    - 多选与单选场景分别使用 MenuCheckboxItem 与 MenuRadioItemGroup
  codegenTemplates:
    minimal: |-
      <Menu>
        <MenuTrigger as-child><Button>Open</Button></MenuTrigger>
        <MenuContent>
          <MenuItem value="item1"><MenuItemText>Item 1</MenuItemText></MenuItem>
        </MenuContent>
      </Menu>
    controlled: |-
      <Menu v-model:open="open">
        <MenuTrigger as-child><Button>Toggle</Button></MenuTrigger>
        <MenuContent>
          <MenuItem value="copy"><MenuItemText>Copy</MenuItemText></MenuItem>
        </MenuContent>
      </Menu>
    checkbox: |-
      <Menu>
        <MenuTrigger as-child><Button>Checkbox Menu</Button></MenuTrigger>
        <MenuContent>
          <MenuCheckboxItem v-for="v in items" :key="v" :value="v" :checked="checked.includes(v)" @update:checked="(val) => toggle(v, val)">
            <MenuItemText>{{ v }}</MenuItemText>
          </MenuCheckboxItem>
        </MenuContent>
      </Menu>
    radio: |-
      <Menu>
        <MenuTrigger as-child><Button>Radio Menu</Button></MenuTrigger>
        <MenuContent>
          <MenuRadioItemGroup v-model="selected">
            <MenuRadioItem v-for="v in items" :key="v" :value="v">
              <MenuItemText>{{ v }}</MenuItemText>
            </MenuRadioItem>
          </MenuRadioItemGroup>
        </MenuContent>
      </Menu>
    submenu: |-
      <Menu>
        <MenuTrigger as-child><Button>Submenu</Button></MenuTrigger>
        <MenuContent>
          <MenuArrow />
          <Menu :positioning="{ placement: 'right', offset: { mainAxis: 10 } }">
            <MenuTriggerItem value="sub1">Submenu 1</MenuTriggerItem>
            <Teleport to="body">
              <MenuContent>
                <MenuItem value="a"><MenuItemText>A</MenuItemText></MenuItem>
              </MenuContent>
            </Teleport>
          </Menu>
        </MenuContent>
      </Menu>
    context-trigger: |-
      <Menu @select="selected = $event.value">
        <MenuContextTrigger as-child>
          <div>Right click here</div>
        </MenuContextTrigger>
        <MenuContent>
          <MenuItem v-for="v in items" :key="v" :value="v">
            <MenuItemText>{{ v }}</MenuItemText>
          </MenuItem>
        </MenuContent>
      </Menu>
  antiPatterns:
    - <Menu><MenuContent><MenuRadioItemGroup v-model="selected"><MenuCheckboxItem v-for="v
      in items" :key="v" :value="v" :checked="selected.includes(v)" @update:checked="toggle"><MenuItemText>{{
      v }}</MenuItemText></MenuCheckboxItem></MenuRadioItemGroup></MenuContent></Menu>
    - <Menu><MenuTrigger><Button>Open</Button></MenuTrigger><MenuContent><MenuTriggerItem
      value="sub">Sub</MenuTriggerItem><MenuContent><MenuItem value="a"><MenuItemText>A</MenuItemText></MenuItem></MenuContent></Menu></MenuContent></Menu>
provenance:
  sources:
    - path: ./menu.doc.mdx
      kind: doc
    - path: ./props.ts
      kind: type
    - path: ./Menu.vue
      kind: runtime
    - path: ./MenuContent.vue
      kind: runtime
    - path: ./MenuItem.vue
      kind: runtime
    - path: ./MenuItemGroup.vue
      kind: runtime
    - path: ./MenuCheckboxItem.vue
      kind: runtime
    - path: ./MenuRadioItem.vue
      kind: runtime
    - path: ./MenuRadioItemGroup.vue
      kind: runtime
    - path: ./MenuTriggerItem.vue
      kind: runtime
    - path: ./menu.stories.ts
      kind: story
  precedence:
    - runtime
    - type
    - doc
