schemaVersion: 2.0.0
docId: rark.vue.toggle
component:
  name: Toggle
  framework: vue
  package: '@raxium/vue/core'
  importPath: '@raxium/vue/core'
  exportName: Toggle
  category: core
  description: 用于表达可按下/取消按下的二态按钮，适合静音、收藏、布局切换等即时状态开关场景。基于 Ark UI Toggle 构建，支持受控/非受控状态与表单语义透传，并扩展
    theme 配置能力。
  basePrimitive:
    library: '@ark-ui/vue/toggle'
    primitive: Toggle.Root
    nativeElement: button
  passThrough:
    htmlAttributes:
      - aria-pressed
      - disabled
      - id
      - name
      - value
      - aria-*
      - data-*
    notes: 以 Ark UI Root 能力为主，透传 pressed/defaultPressed、disabled、asChild、id、name、value
      等。
  capabilities:
    - pressed
    - disabled
    - asChild
    - theme
contracts:
  props:
    - name: pressed
      typeText: boolean
      conflictsWith:
        - defaultPressed
      description: 受控按下状态（可配合 v-model:pressed）。
    - name: defaultPressed
      typeText: boolean
      conflictsWith:
        - pressed
      description: 非受控模式下的初始按下状态。
    - name: disabled
      typeText: boolean
      description: 是否禁用交互。
    - name: asChild
      typeText: boolean
      default: false
      description: 将交互能力合并到子元素。
    - name: id
      typeText: string
      description: 表单语义与标识。
    - name: name
      typeText: string
      description: 表单语义。
    - name: value
      typeText: string
      description: 表单值。
    - name: class
      typeText: HTMLAttributes['class']
      description: 根节点附加 class。
    - name: theme
      typeText: ThemeCrafts<'tvToggle'>
      description: 主题参数与 crafts 覆写入口。
  events:
    - name: update:pressed
      payload:
        typeText: '(pressed: boolean)'
      description: 受控状态同步事件（用于 v-model:pressed）。
    - name: pressedChange
      payload:
        typeText: '(details: Ark UI pressed change details)'
      description: 底层 Ark UI 状态变更事件，参数结构与 Ark UI 保持一致。
  slots:
    - name: default
      slotPropsSchema:
        type: object
        properties: {}
        additionalProperties: false
      description: 按钮内容插槽，可放文本、图标或两者组合。
  themeConfiguration:
    fields:
      - name: size
        typeText: '''xs'' | ''sm'' | ''base'' | ''lg'''
        default: base
        description: 控制按钮尺寸与内边距。
      - name: crafts
        typeText: object
        description: 覆写 tvToggle crafts 生成逻辑。
behaviorModel:
  derived:
    isPressed: pressed
  transitions:
    - on: click
      guard: disabled !== true
      effects:
        - setPressed(!pressed)
        - emit:update:pressed
        - emit:pressedChange
exampleDefaults:
  mcp:
    server: raxium
    tool: get-example
    args:
      framework: vue
      componentName: Toggle
examples:
  - id: basic
    description: 基础用法（含图标）
  - id: states
    description: 状态示例（默认/按下/禁用）
  - id: sizes
    description: 尺寸变体
  - id: controlled
    description: 受控模式
  - id: grouped
    description: 分组使用（结合 ToggleGroup）
generationHints:
  preferredUsageOrder:
    - pressed
    - defaultPressed
    - theme.size
    - disabled
  a11yChecklist:
    - 仅图标的 toggle 建议提供 aria-label 或可见文本。
    - 需要表达不可操作状态时使用 disabled，不要仅用视觉样式弱化。
    - 与表单联动时建议补齐 name 与 value。
  codegenTemplates:
    minimal: <Toggle>Mute</Toggle>
    controlled: <Toggle v-model:pressed="muted">Mute</Toggle>
  antiPatterns:
    - <Toggle :pressed="muted" :default-pressed="true">Mute</Toggle> — 同时使用 pressed
      与 defaultPressed 导致冲突。
    - <Toggle @update:pressed="submit">Save</Toggle> — 异步提交时未设置 disabled，导致重复点击触发多次
      submit。
    - <div v-for="opt in options"><Toggle>{{ opt }}</Toggle></div> — 互斥选择应使用 ToggleGroup
      管理。
provenance:
  sources:
    - path: ./toggle.doc.mdx
      kind: doc
    - path: ./props.ts
      kind: type
    - path: ./Toggle.vue
      kind: runtime
    - path: ./toggle.stories.ts
      kind: story
  precedence:
    - runtime
    - type
    - doc
