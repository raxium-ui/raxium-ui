schemaVersion: 2.0.0
docId: rark.vue.scroll-area
component:
  name: ScrollArea
  framework: vue
  package: '@raxium/vue/core'
  importPath: '@raxium/vue/core'
  exportName: ScrollArea
  category: core
  description: 用于在固定容器内承载可滚动内容，支持垂直/水平滚动条组合与角落补位（Corner）。基于 Ark UI Scroll Area 构建，透传
    Ark UI Root 能力，并扩展 theme 与 ui 配置。
  basePrimitive:
    library: '@ark-ui/vue/scroll-area'
    primitive: ark.scroll-area
    nativeElement: div
  passThrough:
    htmlAttributes:
      - aria-*
      - data-*
    notes: 根组件透传 ScrollAreaRootBaseProps 到底层 Ark UI Root。
  capabilities:
    - theme
    - ui-override
    - scroll-events
    - conditional-scrollbar
  subComponents:
    - ScrollAreaScrollbar
    - ScrollAreaCorner
contracts:
  props:
    - name: class
      typeText: string | array | object
      description: 根节点自定义 class
    - name: theme
      typeText: ScrollAreaTheme
      description: 根组件主题配置（含 size 与 crafts 覆盖）
    - name: ui
      typeText: '{ root?: HTMLAttributes[''class'']; viewport?: HTMLAttributes[''class''];
        content?: HTMLAttributes[''class''] }'
      description: 局部样式覆盖（root/viewport/content）
  events:
    - name: scrollstart
      payload:
        typeText: '(event: Event)'
      description: Viewport 开始滚动时触发
    - name: scroll
      payload:
        typeText: '(event: Event)'
      description: Viewport 滚动过程中触发
    - name: scrollend
      payload:
        typeText: '(event: Event)'
      description: Viewport 结束滚动时触发
  slots:
    - name: default
      slotPropsSchema:
        type: object
        properties: {}
        additionalProperties: false
      description: 内容与子组件插槽；可放置业务内容、ScrollAreaScrollbar、ScrollAreaCorner
  themeConfiguration:
    fields:
      - name: size
        typeText: '''xs'' | ''sm'' | ''base'' | ''lg'''
        default: base
        description: 滚动条尺寸变体（影响 scrollbar 与 thumb 厚度）
      - name: crafts
        typeText: object
        description: 覆盖 tvScrollArea crafts 配置
  uiConfiguration:
    fields:
      - name: ui.root
        typeText: string | array | object
        description: 根节点 class 覆盖
      - name: ui.viewport
        typeText: string | array | object
        description: Viewport 节点 class 覆盖
      - name: ui.content
        typeText: string | array | object
        description: Content 节点 class 覆盖
subComponents:
  ScrollAreaScrollbar:
    props:
      - name: orientation
        typeText: '''horizontal'' | ''vertical'''
        default: vertical
        description: 滚动条方向；未指定时默认 vertical
      - name: class
        typeText: string | array | object
        description: 滚动条节点 class 覆盖
      - name: theme
        typeText: Omit<ScrollAreaTheme, 'crafts'>
        description: 滚动条局部主题配置（用于覆盖尺寸等主题参数）
      - name: ui
        typeText: '{ root?: HTMLAttributes[''class'']; thumb?: HTMLAttributes[''class'']
          }'
        description: Scrollbar 根节点与 Thumb 节点 class 覆盖
    slots: []
    uiConfiguration:
      fields:
        - name: ui.root
          typeText: string | array | object
          description: Scrollbar 根节点 class 覆盖
        - name: ui.thumb
          typeText: string | array | object
          description: Thumb 节点 class 覆盖
  ScrollAreaCorner:
    props:
      - name: class
        typeText: string | array | object
        description: Corner 节点 class 覆盖
      - name: theme
        typeText: Omit<ScrollAreaTheme, 'crafts'>
        description: 角落节点局部主题配置
    slots: []
behaviorModel:
  derived:
    isShowScrollbarsVertical: viewportHeight < contentHeight
    isShowScrollbarsHorizontal: viewportWidth < contentWidth
  transitions:
    - on: scrollstart
      guard: always
      effects:
        - emit:scrollstart
    - on: scroll
      guard: always
      effects:
        - emit:scroll
    - on: scrollend
      guard: always
      effects:
        - emit:scrollend
exampleDefaults:
  mcp:
    server: raxium
    tool: get-example
    args:
      framework: vue
      componentName: ScrollArea
examples:
  - id: basic
    description: 基础用法
  - id: both-axes
    description: 双轴滚动与 Corner
  - id: sizes
    description: 尺寸变体
  - id: custom-ui
    description: UI 定制
generationHints:
  preferredUsageOrder:
    - theme.size
    - ui.root
    - ui.viewport
    - ui.content
  a11yChecklist:
    - 推荐按 ScrollArea + ScrollAreaScrollbar (+ ScrollAreaCorner) 的固定结构组合
    - 单轴滚动场景仅保留一个 ScrollAreaScrollbar
    - 双轴场景补充 orientation="horizontal" 与 ScrollAreaCorner
  codegenTemplates:
    minimal: <ScrollArea><ScrollAreaScrollbar /><div>content</div></ScrollArea>
    bothAxes: <ScrollArea><ScrollAreaScrollbar /><ScrollAreaScrollbar orientation="horizontal"
      /><ScrollAreaCorner /><div>content</div></ScrollArea>
  antiPatterns:
    - <ScrollArea><div>content</div></ScrollArea>
    - <ScrollArea class="overflow-auto"><div>content</div></ScrollArea>
    - <ScrollArea><ScrollAreaScrollbar /><ScrollAreaScrollbar orientation="horizontal"
      /><div>content</div></ScrollArea>
provenance:
  sources:
    - path: ./scroll-area.doc.mdx
      kind: doc
    - path: ./props.ts
      kind: type
    - path: ./ScrollArea.vue
      kind: runtime
    - path: ./ScrollAreaScrollbar.vue
      kind: runtime
    - path: ./ScrollAreaCorner.vue
      kind: runtime
    - path: ./scroll-area.stories.ts
      kind: story
  precedence:
    - runtime
    - type
    - doc
