schemaVersion: 2.0.0
docId: rark.vue.radio-group
component:
  name: RadioGroup
  framework: vue
  package: '@raxium/vue/core'
  importPath: '@raxium/vue/core'
  exportName: RadioGroup
  category: core
  description: 用于管理单选集合场景，适合筛选条件、配置项切换、设置面板等只允许选择一个值的交互。基于 Ark UI Radio Group 原语构建，支持受控/非受控值管理，并扩展
    theme、variant 以及 ui 样式入口。由 RadioGroup（根）与 RadioGroupItem（子组件）组成；RadioGroupItem
    承载单选项，扩展 label、variant 与 ui 样式入口。
  basePrimitive:
    library: '@ark-ui/vue/radio-group'
    primitive: RadioGroup.RootProvider
    nativeElement: div
  passThrough:
    htmlAttributes:
      - aria-*
      - data-*
    notes: 组件基于 Ark UI Radio Group 封装，通过 useRadioGroup 承接组值状态。
  capabilities:
    - v-model
    - theme
    - ui-override
    - orientation
    - composite-item
  subComponents:
    - RadioGroupItem
contracts:
  props:
    - name: modelValue
      typeText: string | number | symbol | bigint | null
      conflictsWith:
        - defaultValue
      description: 受控模式下的当前值（配合 v-model）
    - name: defaultValue
      typeText: string | number | symbol | bigint | null
      conflictsWith:
        - modelValue
      description: 非受控模式下的初始值
    - name: orientation
      typeText: '''horizontal'' | ''vertical'''
      default: horizontal
      description: 布局方向
    - name: disabled
      typeText: boolean
      description: 禁用整组交互
    - name: name
      typeText: string
      description: 组内隐藏输入的字段名（表单提交语义）
    - name: class
      typeText: string | array | object
      description: 根节点附加 class
    - name: theme
      typeText: ThemeCrafts<'tvRadioGroup'>
      description: 主题参数与 crafts 覆盖入口
  events:
    - name: update:modelValue
      payload:
        typeText: '(value: string | number | symbol | bigint | null)'
      description: 组值变化时触发，用于 v-model 同步
    - name: valueChange
      payload:
        typeText: '(details: { value: string | number | symbol | bigint | null })'
      description: 单选值变化详情事件
  slots:
    - name: default
      slotPropsSchema:
        type: object
        properties: {}
        additionalProperties: false
      description: 组内容器插槽，通常放置多个 RadioGroupItem
    - name: label
      slotPropsSchema:
        type: object
        properties: {}
        additionalProperties: false
      description: 组级标题/说明区域插槽（渲染在 items 之前）
  themeConfiguration:
    fields:
      - name: size
        typeText: '''xs'' | ''sm'' | ''base'' | ''lg'''
        default: base
        description: 控制 control/indicator/text 的尺寸体系
      - name: crafts
        typeText: object
        description: 深度覆写 root/item/itemControl/itemIndicator/itemText 样式
subComponents:
  RadioGroupItem:
    props:
      - name: value
        required: true
        requiredSource: doc
        typeText: string | number | symbol | bigint | null
        description: 单选项值（必填）
      - name: label
        typeText: string
        description: 默认文本标签；也可用默认插槽完全自定义
      - name: variant
        typeText: '''default'' | ''checkbox'''
        default: default
        description: 指示器样式变体（圆点或勾选）
      - name: disabled
        typeText: boolean
        description: 禁用当前项（Ark UI Item 能力）
      - name: class
        typeText: string | array | object
        description: 单选项根节点附加 class
      - name: theme
        typeText: ThemeNoCrafts
        description: 继承或覆盖主题上下文
      - name: ui
        typeText: '{ root?: HTMLAttributes[''class'']; control?: HTMLAttributes[''class''];
          indicator?: HTMLAttributes[''class'']; text?: HTMLAttributes[''class''] }'
        description: UI 覆盖入口：root、control、indicator、text
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties:
            checked:
              type: boolean
          additionalProperties: true
        description: 自定义文本区，作用域含 Ark item context（如 checked）
      - name: control
        slotPropsSchema:
          type: object
          properties:
            checked:
              type: boolean
          additionalProperties: true
        description: 自定义控制区，作用域含 Ark item context（如 checked）
    uiConfiguration:
      fields:
        - name: root
          typeText: string | array | object
          description: 单选项根节点 class 覆盖
        - name: control
          typeText: string | array | object
          description: 控制区 class 覆盖
        - name: indicator
          typeText: string | array | object
          description: 指示器 class 覆盖
        - name: text
          typeText: string | array | object
          description: 文本节点 class 覆盖
behaviorModel:
  derived:
    checkedItem: RadioGroupItem with value === modelValue
  transitions:
    - on: item_select
      guard: disabled !== true
      effects:
        - setModelValue(item.value)
        - emit:update:modelValue
        - emit:valueChange
exampleDefaults:
  mcp:
    server: raxium
    tool: get-example
    args:
      framework: vue
      componentName: RadioGroup
examples:
  - id: basic
    description: 基础用法
  - id: variants
    description: 变体（圆点 / 勾选）
  - id: sizes
    description: 尺寸
  - id: states-and-orientation
    description: 状态与布局方向
  - id: custom-slots
    description: 自定义插槽
generationHints:
  preferredUsageOrder:
    - modelValue / defaultValue
    - orientation
    - theme.size
    - RadioGroupItem.value
    - RadioGroupItem.variant
    - RadioGroupItem.ui
  a11yChecklist:
    - 同一组选项保持 value 类型一致
    - 组级 label 插槽或 aria-label 提供可访问性说明
    - disabled 状态需提供可感知视觉反馈
  codegenTemplates:
    minimal: |-
      <RadioGroup v-model="value">
        <RadioGroupItem value="a" label="A" />
        <RadioGroupItem value="b" label="B" />
      </RadioGroup>
    controlled: |-
      <RadioGroup v-model="selected" orientation="vertical">
        <RadioGroupItem value="1" label="选项 1" />
        <RadioGroupItem value="2" label="选项 2" />
      </RadioGroup>
    withUi: |-
      <RadioGroup v-model="value">
        <RadioGroupItem value="a" label="A" :ui="{ indicator: 'ring-2' }" />
        <RadioGroupItem value="b" label="B" />
      </RadioGroup>
    customSlots: |-
      <RadioGroup v-model="value">
        <RadioGroupItem value="a">
          <template #default="{ checked }">{{ checked ? '已选 A' : 'A' }}</template>
        </RadioGroupItem>
        <RadioGroupItem value="b" label="B" />
      </RadioGroup>
  antiPatterns:
    - <RadioGroup v-model="v" :default-value="'x'">...</RadioGroup> modelValue 与 defaultValue
      同时使用（受控与非受控互斥）
    - <RadioGroup><RadioGroupItem value="1" /> <RadioGroupItem value="two" /> </RadioGroup>
      同一组内 value 类型混用（应统一为 string 或 number）
    - <RadioGroupItem value="a" /> 未使用 label 或默认插槽导致选项无文本（应提供 label 或 default slot）
    - <RadioGroupItem value="a" class="opacity-50" /> 仅靠视觉样式模拟禁用（应使用 disabled）
provenance:
  sources:
    - path: ./radio-group.doc.mdx
      kind: doc
    - path: ./props.ts
      kind: type
    - path: ./RadioGroup.vue
      kind: runtime
    - path: ./RadioGroupItem.vue
      kind: runtime
    - path: ./radio-group.stories.ts
      kind: story
  precedence:
    - runtime
    - type
    - doc
