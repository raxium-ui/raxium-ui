schemaVersion: 2.0.0
docId: rark.vue.popover
component:
  name: Popover
  framework: vue
  package: '@raxium/vue/core'
  importPath: '@raxium/vue/core'
  exportName: Popover
  category: core
  description: 轻量浮层组件，用于承载补充说明、上下文操作与小型交互内容。基于 Ark UI Popover 原语构建，支持受控/非受控打开状态、定位策略，以及
    Raxium UI 的 theme 与局部 ui 样式覆盖能力。
  basePrimitive:
    library: '@ark-ui/vue/popover'
    primitive: Popover.RootProvider
    nativeElement: div
  passThrough:
    htmlAttributes:
      - aria-*
      - data-*
    notes: 根组件透传 Ark UI Root 常用能力（open/defaultOpen、positioning、modal、portalled、closeOnEscape
      等），并扩展 theme。
  capabilities:
    - open
    - positioning
    - theme
    - ui-override
    - lazyMount
    - unmountOnExit
  subComponents:
    - PopoverTrigger
    - PopoverContent
    - PopoverClose
    - PopoverIndicator
contracts:
  props:
    - name: open
      typeText: boolean
      conflictsWith:
        - defaultOpen
      description: 受控打开状态（可配合 v-model:open）。
    - name: defaultOpen
      typeText: boolean
      default: false
      conflictsWith:
        - open
      description: 非受控初始打开状态。
    - name: positioning
      typeText: PositioningOptions
      description: 浮层定位配置（如 placement）。
    - name: lazyMount
      typeText: boolean
      description: 是否延迟挂载内容。
    - name: unmountOnExit
      typeText: boolean
      description: 关闭后是否卸载内容。
    - name: theme
      typeText: ThemeCrafts<'tvPopover'>
      description: 主题参数与 crafts 覆盖入口。
  events:
    - name: update:open
      payload:
        typeText: '(open: boolean)'
      description: 受控状态同步事件（v-model:open）。
    - name: openChange
      payload:
        typeText: '(details: { open: boolean })'
      description: 打开状态变化通知（参数结构遵循 Ark UI）。
  slots:
    - name: default
      slotPropsSchema:
        type: object
        properties: {}
        additionalProperties: false
      description: 放置 Trigger 与 Content 等子组件。
  themeConfiguration:
    fields:
      - name: size
        typeText: '''xs'' | ''sm'' | ''base'' | ''lg'''
        default: base
        description: 控制内容内边距、字体与关闭按钮/指示器尺寸。
      - name: bordered
        typeText: boolean
        default: true
        description: 是否启用边框语义。
      - name: skin
        typeText: '''razer'' | ''shadcn'''
        description: 主题皮肤语义。
      - name: surface
        typeText: '''light'' | ''dark'''
        description: 表面语义（亮/暗）。
      - name: unstyled
        typeText: boolean
        description: 移除默认样式。
      - name: crafts
        typeText: object
        description: 覆盖 tvPopover crafts 配置。
subComponents:
  PopoverTrigger:
    props:
      - name: asChild
        typeText: boolean
        default: false
        description: 将触发行为合并到子元素（Ark UI 能力）。
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        description: 触发器内容；可配合 asChild 复用现有按钮。
  PopoverContent:
    props:
      - name: class
        typeText: HTMLAttributes['class']
        description: 内容容器附加 class。
      - name: theme
        typeText: ThemeNoCrafts
        description: 继承主题上下文，也可局部覆盖主题参数。
      - name: ui
        typeText: '{ positioner?: HTMLAttributes[''class'']; content?: HTMLAttributes[''class''];
          inner?: HTMLAttributes[''class''] }'
        description: 定位容器、内容层、内容内层样式覆盖。
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        description: 弹层内容；内部会识别并优先渲染 PopoverArrow。
    themeConfiguration:
      fields:
        - name: size
          typeText: '''xs'' | ''sm'' | ''base'' | ''lg'''
          typeSchema:
            enum:
              - xs
              - sm
              - base
              - lg
          default: base
          defaultKind: explicit-doc
          description: 内容尺寸（继承根 theme）。
        - name: bordered
          typeText: boolean
          typeSchema:
            type: boolean
          default: true
          defaultKind: explicit-doc
          description: 边框语义（继承根 theme）。
        - name: skin
          typeText: '''razer'' | ''shadcn'''
          typeSchema:
            enum:
              - razer
              - shadcn
          default: null
          defaultKind: unknown
          description: 皮肤语义（继承根 theme）。
        - name: surface
          typeText: '''light'' | ''dark'''
          typeSchema:
            enum:
              - light
              - dark
          default: null
          defaultKind: unknown
          description: 表面语义（继承根 theme）。
    uiConfiguration:
      fields:
        - name: ui.positioner
          typeText: string | array | object
          description: 定位容器样式覆盖。
        - name: ui.content
          typeText: string | array | object
          description: 内容层样式覆盖。
        - name: ui.inner
          typeText: string | array | object
          description: 内容内层样式覆盖。
  PopoverClose:
    props:
      - name: class
        typeText: HTMLAttributes['class']
        description: 关闭按钮 class。
      - name: asChild
        typeText: boolean
        default: false
        description: 将默认按钮行为合并到子元素。
      - name: theme
        typeText: ThemeNoCrafts
        description: 关闭按钮主题覆盖（继承根 theme）。
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        description: 自定义关闭按钮内容；不传则渲染默认关闭图标。
    themeConfiguration:
      fields:
        - name: size
          typeText: '''xs'' | ''sm'' | ''base'' | ''lg'''
          typeSchema:
            enum:
              - xs
              - sm
              - base
              - lg
          default: base
          defaultKind: explicit-doc
          description: 关闭按钮尺寸（继承根 theme）。
        - name: skin
          typeText: '''razer'' | ''shadcn'''
          typeSchema:
            enum:
              - razer
              - shadcn
          default: null
          defaultKind: unknown
          description: 皮肤语义（继承根 theme）。
        - name: surface
          typeText: '''light'' | ''dark'''
          typeSchema:
            enum:
              - light
              - dark
          default: null
          defaultKind: unknown
          description: 表面语义（继承根 theme）。
  PopoverIndicator:
    props:
      - name: class
        typeText: HTMLAttributes['class']
        description: 指示器 class。
      - name: asChild
        typeText: boolean
        default: true
        description: 是否将指示器行为合并到子元素。
      - name: theme
        typeText: ThemeNoCrafts
        description: 指示器主题覆盖（继承根 theme）。
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        description: 自定义触发器状态指示内容；不传则渲染默认箭头图标。
    themeConfiguration:
      fields:
        - name: size
          typeText: '''xs'' | ''sm'' | ''base'' | ''lg'''
          typeSchema:
            enum:
              - xs
              - sm
              - base
              - lg
          default: base
          defaultKind: explicit-doc
          description: 指示器尺寸（继承根 theme）。
        - name: skin
          typeText: '''razer'' | ''shadcn'''
          typeSchema:
            enum:
              - razer
              - shadcn
          default: null
          defaultKind: unknown
          description: 皮肤语义（继承根 theme）。
        - name: surface
          typeText: '''light'' | ''dark'''
          typeSchema:
            enum:
              - light
              - dark
          default: null
          defaultKind: unknown
          description: 表面语义（继承根 theme）。
behaviorModel:
  derived:
    isOpen: open
  transitions:
    - on: trigger_click
      guard: open === false
      effects:
        - setOpen(true)
    - on: close_trigger
      guard: always
      effects:
        - setOpen(false)
exampleDefaults:
  mcp:
    server: raxium
    tool: get-example
    args:
      framework: vue
      componentName: Popover
examples:
  - id: basic
    description: 基础用法
  - id: skins-and-variants
    description: 主题与尺寸变体
  - id: positioning
    description: 定位策略
  - id: context-and-interactive
    description: 上下文与交互内容
  - id: controlled-open
    description: 受控模式
generationHints:
  preferredUsageOrder:
    - defaultOpen
    - positioning
    - theme
  a11yChecklist:
    - PopoverTrigger asChild 挂载到已有按钮，避免额外包裹影响可访问性。
    - 内容中存在输入、开关等可交互元素时，在 PopoverContent 内使用上下文组件组织状态。
  codegenTemplates:
    minimal: |-
      <Popover>
        <PopoverTrigger asChild><Button>Open</Button></PopoverTrigger>
        <PopoverContent>Content</PopoverContent>
      </Popover>
    withIndicator: |-
      <Popover>
        <PopoverTrigger asChild><Button>Open <PopoverIndicator /></Button></PopoverTrigger>
        <PopoverContent><PopoverArrow />Content</PopoverContent>
      </Popover>
    withClose: |-
      <Popover>
        <PopoverTrigger asChild><Button>Open</Button></PopoverTrigger>
        <PopoverContent><PopoverClose />Content</PopoverContent>
      </Popover>
    controlled: |-
      <Popover v-model:open="open">
        <PopoverTrigger asChild><Button>Toggle</Button></PopoverTrigger>
        <PopoverContent>Content</PopoverContent>
      </Popover>
    positioning: |-
      <Popover :positioning="{ placement: 'bottom-start' }">
        <PopoverTrigger asChild><Button>Open</Button></PopoverTrigger>
        <PopoverContent>Content</PopoverContent>
      </Popover>
  antiPatterns:
    - <Popover><Button>Open</Button><PopoverContent>Content</PopoverContent></Popover>
    - <Popover><PopoverTrigger><span>Open</span></PopoverTrigger><div>Content</div></Popover>
    - <Popover :positioning="{}"><PopoverTrigger>Open</PopoverTrigger><PopoverContent>Content</PopoverContent></Popover>
provenance:
  sources:
    - path: ./popover.doc.mdx
      kind: doc
    - path: ./props.ts
      kind: type
    - path: ./Popover.vue
      kind: runtime
    - path: ./PopoverContent.vue
      kind: runtime
    - path: ./PopoverClose.vue
      kind: runtime
    - path: ./PopoverIndicator.vue
      kind: runtime
    - path: ./popover.stories.ts
      kind: story
  precedence:
    - runtime
    - type
    - doc
