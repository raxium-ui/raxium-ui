schemaVersion: 2.0.0
docId: rark.vue.message
component:
  name: Message
  framework: vue
  package: '@raxium/vue/core'
  importPath: '@raxium/vue/core'
  exportName: Messager
  category: core
  description: 基于 Ark UI Toast 能力封装的全局消息提示方案，适合反馈异步结果、状态变更与轻量通知。组件由 Messager（消息容器/根）与
    Message（单条消息渲染）组合而成，支持 useMessage() 编程式 API、主题配置（theme）与样式覆盖（ui）。
  basePrimitive:
    library: '@ark-ui/vue/toast'
    primitive: Toaster
    nativeElement: div
  passThrough:
    htmlAttributes: []
    notes: 'Messager 使用 createToaster 与 Toaster，固定 placement: ''top''；Message 基于 Toast.Root
      渲染单条消息，透传 ToastRootBaseProps。Messager 本身不提供 ui 字段，样式覆盖入口位于 Message.ui。'
  capabilities:
    - imperative-api
    - theme
    - ui-override
    - custom-render
    - promise-lifecycle
  subComponents:
    - Message
contracts:
  props:
    - name: max
      typeText: number
      default: 24
      description: 最大同时显示数量，超出后进入队列。
    - name: overlap
      typeText: boolean
      description: 是否允许消息重叠展示。
    - name: duration
      typeText: number
      description: 全局默认停留时长（毫秒），未设置时由消息类型决定。
    - name: gap
      typeText: number
      default: 16
      description: 消息间距。
    - name: offsets
      typeText: string | Record<'left' | 'right' | 'bottom' | 'top', string>
      default: 1rem
      description: 与视口安全边距的偏移设置。
    - name: hotkey
      typeText: string[]
      default:
        - altKey
        - KeyT
      description: 聚焦消息组的快捷键。
    - name: removeDelay
      typeText: number
      default: 200
      description: 关闭后移除延迟（常用于退场动画）。
    - name: pauseOnPageIdle
      typeText: boolean
      default: false
      description: 页面切后台时是否暂停计时。
    - name: showClose
      typeText: boolean
      default: true
      description: 注入到默认插槽的消息参数中，作为每条消息默认关闭按钮策略。
    - name: theme
      typeText: ThemeCrafts<'tvMessage'>
      description: 全局消息主题参数与 crafts 覆盖。
  events: []
  slots:
    - name: default
      slotPropsSchema:
        type: object
        properties:
          message:
            type: object
            description: MessageOptions，含 showClose 等合并后的消息对象
      description: 返回 { message }，用于将当前消息对象绑定到 Message 渲染。
  themeConfiguration:
    fields:
      - name: size
        typeText: '''xs'' | ''sm'' | ''base'' | ''lg'''
        description: 容器下消息的尺寸节奏。
      - name: skin
        typeText: '''razer'' | ''shadcn'''
        description: 主题皮肤。
      - name: crafts
        typeText: object
        description: 覆盖 tvMessage crafts。
subComponents:
  Message:
    props:
      - name: options
        required: true
        requiredSource: type
        typeText: MessageOptions
        description: 单条消息配置（必填），含 type、description、render、showClose、theme。
      - name: class
        typeText: string | string[] | Record<string, boolean>
        description: 消息根节点附加 class。
      - name: theme
        typeText: ThemeNoCrafts['theme']
        description: 单条消息主题参数，和 options.theme 合并。
      - name: ui
        typeText: '{ root?: class; content?: class; description?: class; icon?: class;
          close?: class }'
        description: 各结构节点 class 覆盖。
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties:
            options: {}
            context: {}
        renderWhen:
          - expr: '!options?.render'
        description: 自定义整条消息结构；作用域参数含 options 与 context。
      - name: icon
        slotPropsSchema:
          type: object
          properties:
            options: {}
            context: {}
        renderWhen:
          - expr: '!options?.render'
        fallback: 按 type 渲染默认图标
        description: 覆盖默认类型图标区域。
      - name: inner
        slotPropsSchema:
          type: object
          properties:
            options: {}
            context: {}
        renderWhen:
          - expr: '!options?.render'
        fallback: Toast.Description
        description: 覆盖描述区域内容。
      - name: close
        slotPropsSchema:
          type: object
          properties:
            options: {}
            context: {}
        renderWhen:
          - expr: options?.showClose === true && context?.type !== 'loading'
        fallback: Toast.CloseTrigger
        description: 覆盖关闭按钮区域；仅在 options.showClose 为真时渲染，loading 类型默认不渲染关闭按钮。
    themeConfiguration:
      fields:
        - name: size
          typeText: '''xs'' | ''sm'' | ''base'' | ''lg'''
          typeSchema:
            enum:
              - xs
              - sm
              - base
              - lg
          default: null
          defaultKind: unknown
          description: 消息尺寸。
        - name: skin
          typeText: '''razer'' | ''shadcn'''
          typeSchema:
            enum:
              - razer
              - shadcn
          default: null
          defaultKind: unknown
          description: 主题皮肤。
    uiConfiguration:
      fields:
        - name: ui.root
          typeText: string | array | object
          description: 消息根节点 class 覆盖。
        - name: ui.content
          typeText: string | array | object
          description: 内容容器 class 覆盖。
        - name: ui.description
          typeText: string | array | object
          description: 描述区域 class 覆盖。
        - name: ui.icon
          typeText: string | array | object
          description: 图标区域 class 覆盖。
        - name: ui.close
          typeText: string | array | object
          description: 关闭按钮区域 class 覆盖。
behaviorModel:
  derived:
    showCloseButton: options?.showClose === true && type !== 'loading'
    iconVNode: 'switch(type): info->Info, success->CircleCheck, error->CircleX, warning->CircleAlert,
      loading->LoaderCircle'
  transitions:
    - on: create
      guard: always
      effects:
        - render_toast
        - start_duration_timer
    - on: options.render
      guard: typeof options?.render === 'function'
      effects:
        - contentNode = options.render(context)
        - slots.default.bypassed = true
        - slots.icon.bypassed = true
        - slots.inner.bypassed = true
        - slots.close.bypassed = true
    - on: close
      guard: showCloseButton
      effects:
        - dismiss_toast
exampleDefaults:
  mcp:
    server: raxium
    tool: get-example
    args:
      framework: vue
      componentName: Message
examples:
  - id: basic
    description: 基础消息类型
  - id: sizes-and-close
    description: 尺寸与关闭按钮
  - id: custom-render
    description: 自定义渲染
  - id: promise
    description: Promise 生命周期消息
  - id: messager-props
    description: 本地 Messager 容器参数
generationHints:
  preferredUsageOrder:
    - Messager 挂载
    - useMessage().message.create/success/error/info/warning/loading
    - message.promise() 统一管理异步生命周期
    - options.type
    - options.description
    - options.showClose
  a11yChecklist:
    - 应用根部至少挂载一个 Messager
    - 消息类型需提供可感知的视觉反馈
    - loading 类型默认不显示关闭按钮
    - 'duration: Infinity 时应提供可见关闭入口'
  codegenTemplates:
    minimal: '<Messager><template #default="{ message }"><Message :options="message"
      /></template></Messager>'
    withUseMessage: 'const { message } = useMessage(); message.success({ description:
      ''操作成功'' });'
    useMessagePromise: 'const { message } = useMessage(); message.promise(fetchData(),
      { loading: ''加载中...'', success: ''完成'', error: ''失败'' });'
    fullSetup: '<Messager :show-close="true" :max="24"><template #default="{ message
      }"><Message :options="message" /></template></Messager>'
  antiPatterns:
    - '在未挂载 <Messager /> 的组件树中调用 useMessage().message.success({ description: ''ok''
      })'
    - 'message.create({ description: ''失败'' }) 未设置 type: ''error'''
    - 手动 try/catch 分别调用 loading/success/error 而非 message.promise(p, { loading, success,
      error })
provenance:
  sources:
    - path: ./message.doc.mdx
      kind: doc
    - path: ./props.ts
      kind: type
    - path: ./Messager.vue
      kind: runtime
    - path: ./Message.vue
      kind: runtime
    - path: ./use-message.ts
      kind: runtime
    - path: ./message.stories.ts
      kind: story
  precedence:
    - runtime
    - type
    - doc
