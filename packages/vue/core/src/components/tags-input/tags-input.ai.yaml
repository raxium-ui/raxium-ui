schemaVersion: 2.0.0
docId: rark.vue.tags-input
component:
  name: TagsInput
  framework: vue
  package: '@raxium/vue/core'
  importPath: '@raxium/vue/core'
  exportName: TagsInput
  category: core
  description: 用于管理字符串标签集合输入，适合关键词录入、技能标注、邮件地址批量输入等场景。基于 Ark UI Tags Input 构建，支持受控/非受控值管理、最大数量与校验策略、横向滚动与换行模式，并扩展
    theme 与 ui 配置能力。由 TagsInput（根）与 TagsInputItem（子组件）组成；TagsInputItem 承载单个标签项，支持内联编辑与删除触发器挂载。
  basePrimitive:
    library: '@ark-ui/vue/tags-input'
    primitive: TagsInput.RootProvider
    nativeElement: div
  passThrough:
    htmlAttributes:
      - aria-*
      - data-*
    notes: 根组件透传 TagsInputRootBaseProps 到 Ark UI Root，并扩展 theme、inline 和 ui 配置。
  capabilities:
    - modelValue
    - validate
    - max
    - inline
    - theme
    - ui-override
  subComponents:
    - TagsInputItem
contracts:
  props:
    - name: modelValue
      typeText: string[]
      conflictsWith:
        - defaultValue
      description: 受控值（配合 v-model）。
    - name: defaultValue
      typeText: string[]
      conflictsWith:
        - modelValue
      description: 非受控初始值。
    - name: max
      typeText: number
      description: 可创建的最大标签数（超出时触发 valueInvalid）。
    - name: validate
      typeText: (details) => boolean
      description: 创建前校验函数，可用于去重、长度限制、格式过滤等策略。
    - name: disabled
      typeText: boolean
      description: 是否禁用交互。
    - name: readOnly
      typeText: boolean
      description: 是否只读。
    - name: invalid
      typeText: boolean
      description: 是否无效状态。
    - name: inline
      typeText: boolean
      default: true
      description: 是否使用行内横向滚动模式；为 false 时以换行流式布局展示。
    - name: class
      typeText: HTMLAttributes['class']
      description: 根节点附加 class。
    - name: theme
      typeText: ThemeCrafts<'tvTagsInput' | 'tvInput'>
      description: 主题参数与 crafts 覆盖入口。
    - name: ui
      typeText: '{ root?: class, control?: class, input?: class }'
      description: 局部 class 覆盖：root、control、input。
  events:
    - name: update:modelValue
      payload:
        typeText: '(value: string[])'
      description: 受控值同步（v-model）。
    - name: valueChange
      payload:
        typeText: '(details: { value: string[] })'
      description: 标签集合变化时触发。
    - name: highlightChange
      payload:
        typeText: '(details: { highlightedValue: string | null })'
      description: 高亮标签变化时触发（键盘导航常用）。
    - name: valueInvalid
      payload:
        typeText: '(details: { reason: string })'
      description: 创建失败时触发（如超出 max 或 validate 未通过）。
  slots:
    - name: default
      slotPropsSchema:
        type: object
        properties:
          items:
            type: array
            items:
              type: string
        required:
          - items
      description: 渲染标签项区域，作用域参数 items 为当前标签列表。
    - name: prefix
      slotPropsSchema:
        type: object
        properties: {}
        additionalProperties: false
      description: 输入控制区前置内容。
    - name: suffix
      slotPropsSchema:
        type: object
        properties: {}
        additionalProperties: false
      description: 输入控制区后置内容。
  themeConfiguration:
    fields:
      - name: size
        typeText: '''xs'' | ''sm'' | ''base'' | ''lg'''
        description: 控制输入框与标签项尺寸体系。
      - name: skin
        typeText: '''razer'' | ''shadcn'''
        description: 主题皮肤。
      - name: surface
        typeText: '''light'' | ''dark'''
        description: 表面语义模式。
      - name: unstyled
        typeText: boolean
        description: 去除默认样式。
      - name: crafts
        typeText: object
        description: 覆盖 tvTagsInput / tvInput 样式生成逻辑。
  uiConfiguration:
    fields:
      - name: ui.root
        typeText: HTMLAttributes['class']
        description: 根节点 class 覆盖。
      - name: ui.control
        typeText: HTMLAttributes['class']
        description: 控制区 class 覆盖。
      - name: ui.input
        typeText: HTMLAttributes['class']
        description: 输入框 class 覆盖。
subComponents:
  TagsInputItem:
    props:
      - name: value
        required: true
        requiredSource: doc
        typeText: string
        description: 当前标签值。
      - name: index
        required: true
        requiredSource: doc
        typeText: number
        description: 当前标签索引（用于与根状态关联）。
      - name: disabled
        typeText: boolean
        description: 禁用单个标签项交互。
      - name: class
        typeText: HTMLAttributes['class']
        description: 标签项根节点 class 覆盖。
      - name: theme
        typeText: ThemeNoCrafts
        description: 继承或覆盖主题上下文。
      - name: ui
        typeText: '{ root?: class, preview?: class, input?: class, text?: class }'
        description: 局部 class 覆盖：root、preview、input、text。
    slots:
      - name: default
        slotPropsSchema:
          type: object
          properties: {}
          additionalProperties: false
        description: 标签项扩展区域，常用于挂载删除按钮等操作部件（如 ArkTagsInput.ItemDeleteTrigger）。
    uiConfiguration:
      fields:
        - name: ui.root
          typeText: HTMLAttributes['class']
          description: 标签项根节点 class 覆盖。
        - name: ui.preview
          typeText: HTMLAttributes['class']
          description: 标签展示容器 class 覆盖。
        - name: ui.input
          typeText: HTMLAttributes['class']
          description: 标签内编辑输入框 class 覆盖。
        - name: ui.text
          typeText: HTMLAttributes['class']
          description: 标签文本 class 覆盖。
behaviorModel:
  derived:
    items: value
    showScrollArea: inline === true
  transitions:
    - on: add_tag
      guard: validate_pass && (max === undefined || value.length < max)
      effects:
        - addToValue(newValue)
        - emit:update:modelValue
        - emit:valueChange
    - on: remove_tag
      guard: always
      effects:
        - removeFromValue(index)
        - emit:update:modelValue
        - emit:valueChange
    - on: create_failed
      guard: '!validate_pass || (max !== undefined && value.length >= max)'
      effects:
        - emit:valueInvalid
exampleDefaults:
  mcp:
    server: raxium
    tool: get-example
    args:
      framework: vue
      componentName: TagsInput
examples:
  - id: basic
    description: 基础用法（受控模式）
  - id: sizes
    description: 尺寸变体
  - id: inline
    description: 行内滚动与换行布局
  - id: states
    description: 常见状态（禁用/只读/无效）
  - id: max-and-validate
    description: 最大标签数与创建校验
  - id: events
    description: 事件监听与删除操作
  - id: programmatic
    description: 编程式调用（focus/add/set/clear）
generationHints:
  preferredUsageOrder:
    - modelValue
    - inline
    - max
    - validate
    - theme
  a11yChecklist:
    - 表单中提供明确的可见标签或辅助文案，不仅依赖 placeholder。
    - invalid 状态建议同步外部错误提示文本。
    - 只读与禁用语义应区分：readOnly 保留可聚焦与可读，disabled 用于完全禁止交互。
  codegenTemplates:
    minimal: |-
      <TagsInput v-model="tags">
        <template #default="{ items }">
          <TagsInputItem v-for="(item, i) in items" :key="`${item}-${i}`" :value="item" :index="i" />
        </template>
      </TagsInput>
    withDeleteTrigger: |-
      <TagsInput v-model="tags">
        <template #default="{ items }">
          <TagsInputItem v-for="(v, i) in items" :key="`${v}-${i}`" :value="v" :index="i">
            <ArkTagsInput.ItemDeleteTrigger><X class="size-3.5" /></ArkTagsInput.ItemDeleteTrigger>
          </TagsInputItem>
        </template>
      </TagsInput>
    withValidate: <TagsInput v-model="tags" :validate="(d) => !tags.includes(d.inputValue)"
      />
    withMaxAndInvalid: |-
      <TagsInput v-model="tags" :max="5" @value-invalid="(d) => toast.error(d.reason)">
        <template #default="{ items }">
          <TagsInputItem v-for="(v, i) in items" :key="`${v}-${i}`" :value="v" :index="i" />
        </template>
      </TagsInput>
  antiPatterns:
    - <TagsInput v-model="tags" :max="3" /> 设置 max 时未监听 valueInvalid，用户无法得知创建失败原因
    - <TagsInput v-model="tags" @value-change="validate" @value-invalid="validate" />
      在多个事件里重复校验逻辑，应集中到 validate prop
    - <TagsInputItem :value="item" /> 缺少 :index，导致与根状态关联错误
provenance:
  sources:
    - path: ./tags-input.doc.mdx
      kind: doc
    - path: ./props.ts
      kind: type
    - path: ./TagsInput.vue
      kind: runtime
    - path: ./TagsInputItem.vue
      kind: runtime
    - path: ./tags-input.stories.ts
      kind: story
  precedence:
    - runtime
    - type
    - doc
